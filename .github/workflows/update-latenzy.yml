name: Auto-update latenzy subtree

on:
  schedule:
    - cron: '0 0 * * *'  # once per day at 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-latenzy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the zetatest repo
      - name: Checkout zetatest
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Configure git user for commits
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Add latenzy remote
      - name: Add latenzy as remote
        run: |
          git remote add latenzy https://github.com/Herseninstituut/latenzy.git || true
          git fetch latenzy

      # Add or update subtree
      - name: Add or update latenzy subtree
        run: |
          if [ ! -d "latenzy" ]; then
            git subtree add --prefix=latenzy latenzy main --squash -m "Add latenzy subtree"
          else
            git subtree pull --prefix=latenzy latenzy main --squash -m "Update latenzy subtree"
          fi

      # Commit only if there are changes
      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add .
            git commit -m "Update latenzy subtree"
          fi

      # Push changes
      - name: Push changes
        run: |
          git push origin HEAD:${{ github.ref }}
